    <style>
        :root {
            --primary: #00d06a;
            --primary-dim: #00b85a;
            --bg: #080f0b;
            --panel: #0e1f16;
            --border: #1e5c38;

        * { box-sizing: border-box; }
        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;

            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;

            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(0,80,40,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(0,40,20,0.3) 0%, transparent 60%);
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
            );
            pointer-events: none;
            z-index: 9999;

        #game-container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-top: 2px solid var(--primary);
            padding: 20px;
            border-radius: 4px;
            box-shadow:
                0 0 50px rgba(0,100,55,0.35),
                0 0 100px rgba(0,80,40,0.12),
                inset 0 1px 0 rgba(0,123,67,0.18);
            width: 95%;
            max-width: 640px;
            text-align: center;
            position: relative;
            z-index: 2;

        #game-container::before {
            content: '◈';

            top: 8px; left: 12px;
            font-size: 0.6rem;
            color: var(--primary-dim);

        }
        #game-container::after {
            content: '◈';

            top: 8px; right: 12px;

        }
        .header-bar {
            display: flex;

        .header-bar::before {

        }
        .header-bar::after {

        h1 {
            margin: 0;
            letter-spacing: 6px;
            font-size: 1.6rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0,123,67,1.0), 0 0 40px rgba(0,123,67,0.5), 0 0 80px rgba(0,123,67,0.2);
        }
        .subtitle {
            font-size: 0.65rem;

            margin-bottom: 16px;

        }
        button {
            background: transparent;

        button:hover {

            border-color: var(--primary);

        }
        @media (max-width: 700px) {
            body { justify-content: flex-start; padding: 8px 0; }
            #game-container { padding: 12px; border-radius: 0; border-left: none; border-right: none; width: 100%; max-width: 100%; }
            h1 { font-size: 1.3rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <div class="header-bar">
        <h1><a href="https://jl1gix.com" style="color:inherit; text-decoration:none;">モールス打</a></h1>
    </div>
    <div class="subtitle">▸ AMATEUR RADIO CONTEST TRAINER ◂</div>

    <div id="mode-select">
        <div style="font-size:0.72rem;color:var(--primary-dim);letter-spacing:2px;margin:18px 0 24px;opacity:0.85;">
            CW コンテスト交信を想定したモールス符号練習ツール

            </button>
            <button onclick="location.href='tx.html'" style="font-size:0.95rem;padding:14px 32px;letter-spacing:2px;min-width:160px;">

</div>

<footer style="
    margin-top: 20px;
    padding: 12px 0 4px;
    border-top: 1px solid #1e5c38;
    font-size: 0.65rem;
    letter-spacing: 1px;
    opacity: 0.55;
    text-align: center;
">
    <div style="display:flex; justify-content:center; flex-wrap:wrap; gap:10px 20px;">
        <a href="ranking.html" style="color:#007b43; text-decoration:none;">ランキング</a>
        <a href="morse-table.html" style="color:#007b43; text-decoration:none;">モールス符号表</a>
        <a href="profile.html" style="color:#007b43; text-decoration:none;">運営者情報</a>
        <a href="privacy.html" style="color:#007b43; text-decoration:none;">プライバシーポリシー</a>
        <a href="contact.html" style="color:#007b43; text-decoration:none;">お問い合わせ</a>
    </div>
</footer>

<script>
// ── ホーム画面：スペクトラムスコープ（JL1GIX 20WPM）────────────────────────────
(function() {
    const H_DIT = 1200 / 20;
    const H_MORSE = { J:'.---', L:'.-..', 1:'.----', G:'--.', I:'..', X:'-..-' };

    function buildCycle(text) {
        const ev = [];
        let t = 0;
        [...text].forEach((ch, ci) => {
            const code = H_MORSE[ch] || '';
            [...code].forEach((s) => {
                const dur = s === '.' ? H_DIT : H_DIT * 3;
                ev.push({ on: t, off: t + dur });
                t += dur + H_DIT;
            });
            if (ci < text.length - 1) t += H_DIT * 2;
        });
        t += H_DIT * 4;
        return { ev, total: t };
    }
    const { ev: CY_EV, total: CY_MS } = buildCycle('JL1GIX');

    const SW = 580, SPEC_H = 80, FALL_H = 52, SH = SPEC_H + FALL_H;
    const CW_X = SW / 2;
    const PX_HZ = SW / 3000;
    const FX1 = CW_X - 250 * PX_HZ, FX2 = CW_X + 250 * PX_HZ;

    const sc = document.createElement('canvas');
    sc.id = 'home-scope-canvas';
    sc.width = SW; sc.height = SH;
    sc.style.cssText = [
        'position:absolute',
        'top:50%', 'left:50%',
        'transform:translate(-50%,-50%)',
        'width:96%', 'max-width:' + SW + 'px', 'height:auto',
        'z-index:-1',
        'opacity:0', 'transition:opacity 1.2s',
        'pointer-events:none',
        'border-radius:2px',
        'border:1px solid rgba(0,123,67,0.18)',
    ].join(';');

    const modeSelEl = document.getElementById('mode-select');
    modeSelEl.style.position = 'relative';
    modeSelEl.style.zIndex = '0';
    modeSelEl.insertBefore(sc, modeSelEl.firstChild);

    const PHANTOM = [
        { offset: -880, amp: 0.52, period: 3100, duty: 0.42 },
        { offset: -450, amp: 0.38, period: 2200, duty: 0.35 },
        { offset:  430, amp: 0.46, period: 2750, duty: 0.38 },
        { offset:  860, amp: 0.34, period: 1900, duty: 0.30 },
    ];
    const phantomStr = new Float32Array(PHANTOM.length).fill(0);

    let hActive = false, animId, cycStart;
    let wfRows = [], smoothSpec = new Float32Array(SW).fill(0);
    let tStr = 0, fN = 0;
    let fallImg = null;

    function isToneOn() {
        const t = (Date.now() - cycStart) % CY_MS;
        return CY_EV.some(e => t >= e.on && t <= e.off);
    }
    function isPhantomOn(idx) {
        const p = PHANTOM[idx];
        const t = (Date.now() + idx * 1373) % p.period;
        return t < p.period * p.duty;
    }
    function addPeak(s, cx, amp) {
        const sig2 = 2 * 3.5 * 3.5;
        const peak = amp + Math.random() * 0.06;
        for (let x = Math.max(0, ~~cx - 28); x < Math.min(SW, ~~cx + 28); x++) {
            const d = x - cx;
            s[x] = Math.max(s[x], peak * Math.exp(-(d * d) / sig2));
        }
    }
    function genSpec(mainActive) {
        const s = new Float32Array(SW);
        for (let x = 0; x < SW; x++) {
            s[x] = 0.04 + Math.random() * 0.055;
            if (Math.random() < 0.004) s[x] += Math.random() * 0.12;
        }
        if (mainActive) addPeak(s, CW_X, 0.78);
        PHANTOM.forEach((p, i) => {
            if (phantomStr[i] > 0.05) addPeak(s, CW_X + p.offset * PX_HZ, p.amp * phantomStr[i]);
        });
        return s;
    }
    function wfCol(v) {
        if (v < 0.10) { const t = v/0.10; return [0, ~~(8+t*22), ~~(18+t*28)]; }
        if (v < 0.30) { const t = (v-0.10)/0.20; return [0, ~~(30+t*80), ~~(46-t*26)]; }
        if (v < 0.58) { const t = (v-0.30)/0.28; return [~~(t*40), ~~(110+t*105), ~~(20-t*18)]; }
        if (v < 0.82) { const t = (v-0.58)/0.24; return [~~(40+t*185), ~~(215+t*40), 2]; }
        const t = Math.min(1,(v-0.82)/0.18); return [~~(225+t*30), 255, ~~(t*210)];
    }
    function drawFrame() {
        if (!hActive) return;
        animId = requestAnimationFrame(drawFrame);
        const ctx = sc.getContext('2d');
        tStr = isToneOn() ? Math.min(1, tStr + 0.14) : Math.max(0, tStr - 0.09);
        PHANTOM.forEach((p, i) => {
            phantomStr[i] = isPhantomOn(i) ? Math.min(1, phantomStr[i] + 0.10) : Math.max(0, phantomStr[i] - 0.07);
        });
        const inst = genSpec(tStr > 0.25);
        for (let x = 0; x < SW; x++) smoothSpec[x] = smoothSpec[x] * 0.60 + inst[x] * 0.40;
        if (++fN % 3 === 0) {
            wfRows.unshift(smoothSpec.slice());
            if (wfRows.length > FALL_H) wfRows.pop();
        }
        ctx.fillStyle = '#010d05';
        ctx.fillRect(0, 0, SW, SPEC_H);
        ctx.lineWidth = 0.5;
        for (let i = 1; i <= 4; i++) {
            const y = SPEC_H - (i / 4.5) * (SPEC_H - 14) - 4;
            ctx.strokeStyle = i === 2 ? 'rgba(0,110,55,0.35)' : 'rgba(0,85,40,0.2)';
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(SW, y); ctx.stroke();
        }
        [-1000, -500, 0, 500, 1000].forEach(f => {
            const x = CW_X + f * PX_HZ;
            ctx.strokeStyle = f === 0 ? 'rgba(0,140,65,0.35)' : 'rgba(0,90,45,0.22)';
            ctx.lineWidth = f === 0 ? 0.8 : 0.5;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, SPEC_H); ctx.stroke();
        });
        ctx.fillStyle = 'rgba(0,123,67,0.10)';
        ctx.fillRect(FX1, 0, FX2 - FX1, SPEC_H);
        ctx.strokeStyle = 'rgba(0,160,80,0.38)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(FX1, 0); ctx.lineTo(FX1, SPEC_H);
        ctx.moveTo(FX2, 0); ctx.lineTo(FX2, SPEC_H);
        ctx.stroke();
        const sTop = SPEC_H - 10;
        const fa = 0.22 + tStr * 0.38;
        const g = ctx.createLinearGradient(0, 0, 0, SPEC_H);
        g.addColorStop(0,    `rgba(20,230,110,${fa})`);
        g.addColorStop(0.45, `rgba(0,150,65,${fa * 0.55})`);
        g.addColorStop(1,    'rgba(0,40,18,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.moveTo(0, SPEC_H);
        for (let x = 0; x < SW; x++) ctx.lineTo(x, SPEC_H - smoothSpec[x] * sTop);
        ctx.lineTo(SW - 1, SPEC_H); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = `rgba(0,195,85,${0.65 + tStr * 0.35})`;
        ctx.lineWidth = 1.6;
        ctx.shadowColor = `rgba(0,180,80,${tStr * 0.85})`;
        ctx.shadowBlur = 2 + tStr * 10;
        ctx.beginPath();
        for (let x = 0; x < SW; x++) {
            const y = SPEC_H - smoothSpec[x] * sTop;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
        if (tStr > 0.2) {
            const py = SPEC_H - smoothSpec[~~CW_X] * sTop;
            ctx.strokeStyle = `rgba(0,210,95,${tStr * 0.3})`;
            ctx.lineWidth = 1; ctx.setLineDash([3, 4]);
            ctx.beginPath(); ctx.moveTo(CW_X, py + 2); ctx.lineTo(CW_X, SPEC_H); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = `rgba(140,255,170,${tStr * 0.95})`;
            ctx.beginPath(); ctx.arc(CW_X, py, 2.8, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = `rgba(0,230,100,${tStr * 0.5})`;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(CW_X, py, 5, 0, Math.PI * 2); ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(0,110,55,0.6)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, SPEC_H); ctx.lineTo(SW, SPEC_H); ctx.stroke();
        const d = fallImg.data;
        for (let row = 0; row < Math.min(wfRows.length, FALL_H); row++) {
            const rData = wfRows[row];
            const base = row * SW * 4;
            for (let x = 0; x < SW; x++) {
                const [r, gc, b] = wfCol(rData[x]);
                const i = base + x * 4;
                d[i] = r; d[i+1] = gc; d[i+2] = b; d[i+3] = 255;
            }
        }
        ctx.putImageData(fallImg, 0, SPEC_H);
        ctx.fillStyle = 'rgba(0,123,67,0.07)';
        ctx.fillRect(FX1, SPEC_H, FX2 - FX1, FALL_H);
        ctx.strokeStyle = 'rgba(0,150,75,0.22)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(FX1, SPEC_H); ctx.lineTo(FX1, SPEC_H + FALL_H);
        ctx.moveTo(FX2, SPEC_H); ctx.lineTo(FX2, SPEC_H + FALL_H);
        ctx.stroke();
    }
    function setHomeVis(v) {
        hActive = v;
        sc.style.opacity = v ? '0.42' : '0';
        if (v) {
            cycStart = Date.now();
            fN = 0; tStr = 0;
            wfRows = [];
            for (let i = 0; i < FALL_H; i++) wfRows.push(new Float32Array(SW).fill(0));
            smoothSpec = new Float32Array(SW).fill(0);
            if (!fallImg) fallImg = sc.getContext('2d').createImageData(SW, FALL_H);
            cancelAnimationFrame(animId);
            drawFrame();
        } else {
            cancelAnimationFrame(animId);
        }
    }
    if (document.readyState !== 'loading') setHomeVis(true);
    else window.addEventListener('DOMContentLoaded', () => setHomeVis(true));
})();
</script>
</body>

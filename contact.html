<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | モールス打</title>
    <style>
        :root {
            --primary: #00c060;
            --primary-dim: #00a050;
            --bg: #080f0b;
            --panel: #0e1f16;
            --border: #1e5c38;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: var(--bg);
            color: var(--primary);
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.8;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
            pointer-events: none;
            z-index: 9999;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 4px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0,100,55,0.2);
        }
        .site-name {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: var(--primary-dim);
            margin-bottom: 8px;
        }
        h1 {
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0,123,67,0.8);
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        p {
            font-size: 0.85rem;
            color: var(--primary-dim);
            margin-bottom: 20px;
        }
        .form-wrapper {
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }
        iframe {
            display: block;
            width: 100%;
            border: none;
            min-height: 600px;
            /* iframeの白背景をなじませるための調整 */
            filter: invert(0.92) hue-rotate(100deg) saturate(0.7) brightness(0.85);
        }
        nav {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
        }
        nav a {
            color: var(--primary);
            text-decoration: underline;
            text-underline-offset: 3px;
            letter-spacing: 1px;
        }
        nav a:hover { opacity: 0.7; }
    </style>
</head>
<body>

</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お問い合わせ - モールス打</title>
    <meta name="description" content="モールス打へのお問い合わせページ。ご質問・不具合報告・ご要望はこちらからどうぞ。">
    <meta property="og:title" content="お問い合わせ - モールス打">
    <meta property="og:description" content="モールス打へのお問い合わせページです。">
    <meta property="og:url" content="https://jl1gix.com/contact.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <style>
        :root {
            --primary: #00c060;
            --primary-dim: #00a050;
            --bg: #080f0b;
            --panel: #0e1f16;
            --border: #1e5c38;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: var(--bg);
            color: var(--primary);
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.8;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
            pointer-events: none;
            z-index: 9999;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 4px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0,100,55,0.2);
        }
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 4px;
        }
        .header-bar::before {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--primary-dim));
        }
        .header-bar::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to left, transparent, var(--primary-dim));
        }
        h1 {
            margin: 0;
            letter-spacing: 6px;
            font-size: 1.4rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0,123,67,1.0), 0 0 40px rgba(0,123,67,0.5);
        }
        .subtitle {
            font-size: 0.6rem;
            color: var(--primary-dim);
            letter-spacing: 4px;
            margin-bottom: 28px;
            opacity: 0.9;
            text-align: center;
        }
        p {
            font-size: 0.85rem;
            color: var(--primary-dim);
            margin-bottom: 20px;
        }
        .form-wrapper {
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }
        iframe {
            display: block;
            width: 100%;
            border: none;
            min-height: 950px;
            /* iframeの白背景をなじませるための調整 */
            filter: invert(0.92) hue-rotate(100deg) saturate(0.7) brightness(0.85);
        }
        @media (max-width: 600px) {
            iframe { min-height: 1100px; }
        }
        footer {
            margin: 20px auto 0;
            padding: 12px 0 4px;
            border-top: 1px solid #1e5c38;
            font-size: 0.65rem;
            letter-spacing: 1px;
            opacity: 0.55;
            text-align: center;
            width: 95%;
            max-width: 720px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-bar">
        <h1><a href="https://jl1gix.com" style="color:inherit; text-decoration:none;">モールス打</a></h1>
    </div>
    <div class="subtitle">▸ お問い合わせ ◂</div>

    <p>ご質問・不具合報告・ご要望などがあればお気軽にどうぞ。</p>

    <div class="form-wrapper">
        <iframe
            src="https://docs.google.com/forms/d/e/1FAIpQLSd3d_BiCe4JuH5l6X1tw7S2iMUCWBijup_kufpG2jtHD0w84A/viewform?embedded=true"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            title="お問い合わせフォーム">
            読み込んでいます…
        </iframe>
    </div>

    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 1rem; color: var(--primary-dim); line-height: 2.4;">
        <div>▸ Mail：<a href="mailto:JL1GIX@jarl.com" style="color: var(--primary); text-decoration: underline; text-underline-offset: 3px;">JL1GIX@jarl.com</a></div>
        <div>▸ X(Twitter)：<a href="https://x.com/JL1GIX" target="_blank" rel="noopener" style="color: var(--primary); text-decoration: underline; text-underline-offset: 3px;">@JL1GIX</a></div>
    </div>

</div>

<footer>
    <div style="display:flex; justify-content:center; flex-wrap:wrap; gap:10px 20px;">
        <a href="https://jl1gix.com" style="color:#007b43; text-decoration:none;">トップ</a>
        <a href="ranking.html" style="color:#007b43; text-decoration:none;">ランキング</a>
        <a href="morse-table.html" style="color:#007b43; text-decoration:none;">モールス符号表</a>
        <a href="profile.html" style="color:#007b43; text-decoration:none;">運営者情報</a>
        <a href="privacy.html" style="color:#007b43; text-decoration:none;">プライバシーポリシー</a>
        <a href="contact.html" style="color:#007b43; text-decoration:none;">お問い合わせ</a>
    </div>
</footer>
</body>
</html>

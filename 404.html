<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 NOT FOUND | Morse Center</title>
    <meta name="description" content="お探しのページが見つかりませんでした。Morse Centerのトップページから目的のページをお探しください。">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="theme-color" content="#080f0b">
    <style>
        :root {
            --primary: #00d06a;
            --primary-dim: #00b85a;
            --bg: #080f0b;
            --panel: #0e1f16;
            --border: #1e5c38;
        }
        html, body { scrollbar-gutter: stable; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: var(--bg);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(0,80,40,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(0,40,20,0.3) 0%, transparent 60%);
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
            pointer-events: none;
            z-index: 9999;
        }
        h1 {
            font-size: 3.5rem;
            letter-spacing: 8px;
            margin: 0 0 8px;
            text-shadow: 0 0 20px rgba(0,123,67,0.9), 0 0 50px rgba(0,123,67,0.4);
        }
        .subtitle {
            font-size: 0.9rem;
            color: var(--primary-dim);
            letter-spacing: 4px;
            margin-bottom: 30px;
        }
        .morse {
            font-size: 0.78rem;
            color: var(--primary-dim);
            letter-spacing: 6px;
            margin: 20px 0;
            opacity: 0.7;
        }
        p { font-size: 0.9rem; opacity: 0.85; max-width: 480px; line-height: 1.7; }
        a {
            color: var(--primary);
            text-decoration: none;
            border: 1px solid var(--primary);
            padding: 10px 28px;
            margin-top: 20px;
            display: inline-block;
            letter-spacing: 2px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        a:hover { background: rgba(0,123,67,0.2); box-shadow: 0 0 15px rgba(0,123,67,0.35); color: #fff; }
    </style>
</head>
<body>
    <h1>404</h1>
    <div class="subtitle">▸ NOT FOUND ◂</div>
    <div class="morse">-. ---  ... .. --. -. .- .-..</div>
    <p>受信した周波数に信号が見つかりませんでした。<br>お探しのページは移動したか、削除された可能性があります。</p>
    <a href="https://jl1gix.com/">▶ トップに戻る</a>
</body>
</html>
